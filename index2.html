<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preparando Oferta...</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a0028, #12001f);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    text-align: center;
    color: #fdf4ff;
}

/* partículas */
.particle {
    position: absolute;
    width: 10px;
    height: 10px;
    background: rgba(236, 72, 153, 0.25);
    border-radius: 50%;
    animation: float 8s linear infinite;
    filter: blur(1px);
}

@keyframes float {
    from {
        transform: translateY(110vh) scale(0.5);
        opacity: 0;
    }
    to {
        transform: translateY(-10vh) scale(1.2);
        opacity: 1;
    }
}

.loader-box {
    width: 90%;
    max-width: 420px;
    background: #1f002f;
    border-radius: 28px;
    padding: 40px 26px;
    box-shadow: 0 30px 70px rgba(236,72,153,0.25);
    animation: fadeUp 1s ease;
    z-index: 2;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(35px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.title {
    font-family: 'Poppins', sans-serif;
    font-size: 34px;
    font-weight: 800;
    color: #ec4899;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 16px;
    color: #e9d5ff;
    margin-bottom: 26px;
}

.progress-bar {
    width: 100%;
    height: 22px;
    background: #3b0764;
    border-radius: 30px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ec4899, #a855f7);
    border-radius: 30px;
    transition: width 0.3s ease;
    animation: shine 1.4s infinite;
}

@keyframes shine {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
    100% { filter: brightness(1); }
}

.percent-text {
    margin-top: 12px;
    font-size: 20px;
    font-weight: 700;
    color: #ec4899;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1); }
}

.link-btn {
    display: block;
    margin-top: 30px;
    padding: 15px 0;
    background: linear-gradient(135deg, #ec4899, #a855f7);
    color: #ffffff;
    border-radius: 40px;
    font-size: 17px;
    font-weight: 800;
    font-family: 'Poppins', sans-serif;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 12px 30px rgba(168,85,247,0.4);
}

.link-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 18px 40px rgba(236,72,153,0.6);
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 6) + "s";
    document.body.appendChild(p);
}
</script>

<div class="loader-box">
    <div class="title">MEGA FEIRÃO</div>
    <div class="subtitle">Sua oferta está sendo preparada</div>

    <div class="progress-bar">
        <div id="progress" class="progress-fill"></div>
    </div>

    <div id="percent" class="percent-text">0%</div>

    <a href="https://esperracyber.github.io/feirao/" class="link-btn">
        CONTINUAR
    </a>
</div>

<script>
let percent = 0;
const bar = document.getElementById("progress");
const text = document.getElementById("percent");

const loading = setInterval(() => {
    percent++;
    bar.style.width = percent + "%";
    text.innerText = percent + "%";
    if (percent >= 100) clearInterval(loading);
}, 40);
</script>

</body>
</html>
